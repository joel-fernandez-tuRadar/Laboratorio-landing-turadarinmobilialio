<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Joel Fernandez SAPI</title>
    <style>
        /* 1. Fondo y Estilo Base */
        body {
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 2. El Contenedor del Radar */
        .radar-container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 4px solid #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ffcc;
            background: radial-gradient(circle, #1a1a1a 0%, #000 70%);
            margin-bottom: 20px;
        }

        /* 3. Líneas de Escaneo */
        .radar-line {
            position: absolute;
            width: 50%;
            height: 2px;
            background: linear-gradient(to right, transparent, #00ffcc);
            top: 50%;
            left: 50%;
            transform-origin: left center;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 4. El Buscador (Input) */
        .search-box {
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc;
            border-radius: 25px;
            padding: 10px 20px;
            color: #00ffcc;
            outline: none;
            width: 250px;
            text-align: center;
            font-size: 1.1em;
            box-shadow: 0 0 10px #00ffcc;
        }

        /* 5. Títulos con Brillo Neón */
        h1 {
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00ffcc;
            margin-bottom: 30px;
        }

        /* 6. Puntos Detectados (Blips) */
        .blip {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(3); }
        }

        /* 7. Posiciones de los puntos */
        .p1 { top: 30%; left: 40%; }
        .p2 { top: 60%; left: 70%; }
        .p3 { top: 20%; left: 80%; }

        /* 8. Botón de Escaneo */
        button {
            margin-top: 20px;
            background-color: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 20px #00ffcc;
            transform: scale(1.1);
        }

        /* 9. Efecto de Grid (Cuadrícula) */
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,255,204,0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,204,0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            border-radius: 50%;
        }

        /* 10. Información de estado */
        .status {
            font-size: 0.8em;
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Radar SAPI</h1>

    <div class="radar-container">
        <div class="grid"></div>
        <div class="radar-line"></div>
        <div class="blip p1"></div>
        <div class="blip p2"></div>
        <div class="blip p3"></div>
    </div>

    <input type="text" class="search-box" placeholder="Buscando señales...">
    
    <button onclick="alert('Iniciando rastreo de datos...')">ESCANEAR</button>

    <div class="status">SISTEMA JOEL FERNANDEZ - CONECTADO</div>

</body>
</html>
